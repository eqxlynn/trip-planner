<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>行程管理中心</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- 核心邏輯 -->
    <script src="common.js"></script>
    <script src="main.js"></script>

    <!-- 載入 Google Drive API 與認證庫 -->
    <script async defer src="https://apis.google.com/js/api.js" onload="gapiLoaded()"></script>
    <script async defer src="https://accounts.google.com/gsi/client" onload="gisLoaded()"></script>
    
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800 antialiased">
    
    <header class="bg-white border-b border-slate-200 sticky top-0 z-10">
        <div class="max-w-6xl mx-auto px-6 py-4 flex items-center gap-3">
            <div class="p-2 bg-teal-50 text-teal-600 rounded-lg">
                <i data-lucide="map" class="w-6 h-6"></i>
            </div>
            <div>
                <h1 class="text-xl font-black tracking-tight text-slate-900">行程管理中心</h1>
                <p class="text-xs text-slate-500 font-medium mt-0.5" id="header-subtitle">管理您的本地與雲端行程檔案</p>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-6 py-8">
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6 lg:gap-4 align-top">
            
            <!-- 左側欄：操作區 -->
            <div class="lg:col-span-4 space-y-6">
    
                <section class="bg-white rounded-2xl shadow-sm border border-slate-200 p-5">
                    <h2 class="text-sm font-bold text-slate-800 mb-4 flex items-center gap-4">
                        <i data-lucide="cloud" class="w-4 h-4 text-blue-500"></i>
                        雲端同步
                    </h2>
                    
                    <!-- 加上 mb-4 與按鈕區塊拉開距離 -->
                    <p id="status-text" class="text-[11px] text-slate-500 mt-3 mb-4 text-center font-medium">尚未連結雲端帳號</p>
                    
                    <!-- 💡 新增一個 wrapper 來統一控制按鈕的垂直間距 (gap-3) -->
                    <div class="flex flex-col gap-3">
                        <button id="auth-btn" class="w-full bg-blue-50 hover:bg-blue-100 text-blue-700 font-bold py-2.5 px-4 rounded-xl transition-colors duration-200 flex items-center justify-center gap-2 text-sm border border-blue-100">
                            <i data-lucide="log-in" class="w-4 h-4"></i>
                            <span id="auth-btn-text">連結 Google 帳號</span>
                        </button>

                        <!-- Google Drive 挑選按鈕 (預設隱藏，登入後顯示) -->
                        <button id="picker-btn" onclick="openDrivePicker()" 
                                class="hidden w-full bg-blue-50 hover:bg-blue-100 text-blue-700 font-bold py-3 px-4 rounded-xl border border-blue-200 transition-colors duration-200 flex items-center justify-center gap-2 text-sm shadow-sm">
                            <img src="https://upload.wikimedia.org/wikipedia/commons/1/12/Google_Drive_icon_%282020%29.svg" class="w-4 h-4" alt="Drive">
                            從 Google Drive 匯入
                        </button>
                        
                        <!-- 登出帳號 (修正 typo，並改為 w-fit 讓他像圖片一樣靠左縮小) -->
                        <button id="logout-btn" onclick="handleLogout()" class="hidden bg-blue-50 hover:bg-blue-100 text-blue-700 font-bold py-2.5 px-4 rounded-xl transition-colors duration-200 flex items-center justify-center gap-2 text-sm border border-blue-100">
                            <i data-lucide="log-out" class="w-4 h-4"></i> 
                            <span>登出</span>
                        </button>
                    </div>
                </section>

                <!-- 匯入行程卡片 -->
                <section class="bg-white rounded-2xl shadow-sm border border-slate-200 p-5">
                    <h2 class="text-sm font-bold text-slate-800 mb-4 flex items-center gap-2">
                        <i data-lucide="file-json-2" class="w-4 h-4 text-teal-500"></i>
                        匯入新行程
                    </h2>
                    
                    <input type="file" id="file-upload" class="hidden" accept=".json" onchange="handleFileImport(event)">
                    
                    <div class="space-y-3">
                        <!-- 1. 從電腦選擇 (永遠顯示，不需登入) -->
                        <button onclick="document.getElementById('file-upload').click()" 
                                class="w-full bg-teal-500 hover:bg-teal-600 text-white font-bold py-3 px-4 rounded-xl shadow-sm transition-colors duration-200 flex items-center justify-center gap-2 text-sm">
                            <i data-lucide="monitor-up" class="w-4 h-4"></i>
                            從電腦選擇 .json
                        </button>
                    </div>

                    <p class="text-[11px] text-slate-400 mt-4 leading-relaxed text-center">
                        上傳的檔案將自動儲存本地。<br>若已連結雲端，將同步備份至 Drive。
                    </p>
                </section>
            </div>

            <!-- 右側欄：統一的行程庫 -->
            <div class="lg:col-span-8">
                <section class="bg-white rounded-2xl shadow-sm border border-slate-200 p-1 flex flex-col h-full min-h-[500px]">
                    <div class="flex justify-between items-center p-4 border-b border-slate-100">
                        <h2 class="text-base font-bold text-slate-800 flex items-center gap-2">
                            <i data-lucide="library" class="w-5 h-5 text-indigo-500"></i>
                            <span id="library-title">我的行程庫</span>
                        </h2>
                        <button id="edit-toggle" onclick="toggleEditMode()" 
                                class="text-xs font-bold text-slate-500 hover:text-indigo-700 bg-slate-50 hover:bg-indigo-50 px-3 py-1.5 rounded-lg transition-colors duration-200 border border-slate-200 hover:border-indigo-200 flex items-center gap-1.5">
                            <i data-lucide="settings-2" class="w-3.5 h-3.5"></i>
                            <span id="edit-toggle-txt">管理模式</span>
                        </button>
                    </div>
                    
                    <div class="flex-grow p-4">
                        <div id="trip-list" class="space-y-2.5 max-h-[600px] overflow-y-auto pr-2 custom-scrollbar">
                            <!-- 由 JS 動態生成 (混和 Local 與 Cloud) -->
                        </div>
                    </div>
                </section>
            </div>

        </div>
    </main>
        <button id="btn-create-json" class="fixed bottom-8 right-8 bg-slate-800 text-white px-5 py-3 rounded-full shadow-xl hover:bg-slate-700 hover:shadow-2xl transition-all duration-200 flex items-center gap-2 z-50 print:hidden">
        <i data-lucide="plus" class="w-5 h-5"></i>
        <span class="font-medium tracking-wide">新增</span>
    </button>
</body>
</html>
