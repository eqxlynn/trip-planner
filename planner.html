<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日本旅行・行程規劃助手</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap');
        body {
            font-family: 'Noto Sans TC', sans-serif;
        }
        /* 自訂滾動條 */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        /* 👇 專門用來隱藏特定區塊的滾動條，但保留滾動功能 */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
        }
        ::-webkit-scrollbar-track {
            background: #f1f5f9;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
        /* 🖨️ 專屬列印樣式：隱藏網頁 UI，只顯示列印容器 */
        @media print {
            @page {
                margin: 5mm; 
                size: auto;
            }
            /* 徹底隱藏網頁所有預設內容 (導航、側邊欄、時間軸、預算表等) */
            body > *:not(#print-container) {
                display: none !important;
            }
            /* 只顯示我們用 JS 產生的「精美手冊」容器 */
            #print-container {
                display: block !important;
                position: relative;
                width: 100%;
            }
            /* 強制背景顏色與背景圖列印出來 */
            * {
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }
            /* 每一天強制換頁 */
            .print-page-break {
                page-break-before: always;
            }
            .no-print-link { text-decoration: none !important; }
        }
        /* ✏️ 編輯模式專屬樣式 */
        body.edit-mode [contenteditable="true"] {
            outline-offset: 4px;
            border-radius: 4px;
            transition: all 0.2s ease-in-out;
            cursor: text;
            min-width: 2em; 
            display: inline-block; 
            vertical-align: middle; /* 確保與旁邊的 Icon 或外框保持置中對齊 */
        }
        /* 👇 新增：只有在編輯模式下才顯示的專屬控制項 */
        body:not(.edit-mode) .edit-only-ui {
            display: none !important;
        }

        body.edit-mode [contenteditable="true"]:hover {
            outline-color: #94a3b8;
            background-color: #f8fafc;
        }

        body.edit-mode [contenteditable="true"]:focus {
            outline: 2px solid #10b981; /* 點擊編輯時變成綠色實線 */
            background-color: #ffffff;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }
        /* 只有在編輯模式下，且元素為空時，才顯示 placeholder */
        .edit-mode .editable-element:empty::before {
            content: attr(data-placeholder);
            color: #94a3b8; /* Tailwind 的 slate-400 */
            font-style: italic;
            opacity: 0.8;
            pointer-events: none; /* 避免干擾點擊與輸入 */
        }

        /* 確保空的 div 也有基本高度可以點擊觸發編輯 */
        .edit-mode .editable-element:empty {
            min-height: 1.5em;
            display: inline-block; /* 避免 span 坍塌 */
            min-width: 40px; 
        }
        /* 檢視模式下，隱藏空的編輯區塊，徹底消除多餘間距 */
        body:not(.edit-mode) .editable-element:empty {
            display: none;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col antialiased transition-colors duration-300">

    <!-- 隱藏的列印專用容器 -->
    <div id="print-container" class="hidden font-sans bg-white"></div>

    <!-- 頂部漸層導航欄 -->
    <header id="main-header" class="bg-gradient-to-r from-teal-700 via-emerald-600 to-cyan-600 text-white shadow-md transition-all duration-500">
        <div class="max-w-[1400px] mx-auto px-6 py-4 flex flex-col md:flex-row items-center justify-between gap-4">
            <div class="flex items-center space-x-3.5">
                <div class="p-2 bg-white/15 rounded-xl backdrop-blur-sm shadow-inner">
                    <i data-lucide="map" class="w-7 h-7 text-teal-200" id="header-icon"></i>
                </div>
                <div>
                    <h1 class="text-2xl font-black tracking-wider flex items-center gap-2" id="header-title">
                        載入中...
                    </h1>
                    <p class="text-xs text-teal-100/90 font-medium tracking-wide mt-0.5" id="header-subtitle">
                        載入中...
                    </p>
                </div>
            </div>
            
            <!-- 操作按鈕區塊 -->
            <div class="flex items-center space-x-1 bg-black/15 p-1 rounded-xl backdrop-blur-sm border border-white/5">
                <!-- ✏️ 新增：編輯模式切換按鈕 -->
                <button id="btn-toggle-edit" onclick="toggleEditMode()" class="px-2.5 py-1 text-[11px] font-bold rounded-lg transition-all duration-200 bg-white/10 hover:bg-white/20 text-white flex items-center gap-1">
                    <i data-lucide="edit-3" class="w-4 h-4"></i>
                    <span class="text-sm font-medium">編輯模式</span>
                </button>
                
                <span class="w-[1px] h-4 bg-white/20 mx-1"></span> <!-- 分隔線 -->
                
                <!-- 列印按鈕 -->
                <button onclick="printItinerary()" class="theme-btn px-2.5 py-1 text-[11px] font-bold rounded-lg transition-all duration-200 bg-white/20 hover:bg-white/30 text-white flex items-center gap-1">
                    <i data-lucide="printer" class="w-4 h-4"></i>
                </button>
            </div>
        </div>
    </header>
    <!-- 封面 Guides 顯示與編輯區塊 -->
    <div id="guide-container" class="max-w-[1400px] w-full mx-auto px-6 pt-6 flex flex-col gap-4 hidden">
        <div id="metadata-guides-container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- 這裡會由 JS 動態生成 -->
        </div>
        <!-- 僅在編輯模式顯示的新增按鈕 -->
        <button id="btn-add-guide" onclick="addGuideItem()" class="edit-only-ui flex w-full py-3 mt-2 border-2 border-dashed border-slate-300 text-slate-500 rounded-xl hover:border-emerald-400 hover:text-emerald-600 transition-colors items-center justify-center gap-2 text-sm font-bold bg-slate-50 hover:bg-emerald-50">
            <i data-lucide="plus-circle" class="w-5 h-5 shrink-0"></i>
            <span>新增封面指南</span>
        </button>
    </div>
    <!-- 主內容區 (三欄佈局) -->
    <main class="flex-grow max-w-[1400px] w-full mx-auto px-6 py-6 flex flex-col lg:flex-row gap-2">
        
        <!-- 左側欄：天數選單 + 裝備指南 -->
        <aside class="w-full lg:w-64 shrink-0 flex flex-col gap-4 sticky top-0 z-50 lg:top-6 lg:self-start">
            
            <!-- 移除原本的 max-h 與 overflow-y-auto，讓它完全根據內容長高 -->
            <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-4">
                <h2 class="text-xs font-black text-slate-400 uppercase tracking-widest mb-3 flex items-center justify-between">
                    <span>每日行程軌跡</span>
                    <i data-lucide="navigation" class="w-4 h-4"></i>
                </h2>
                
                <!-- 手機版: overflow-x-auto (允許橫向滑動天數) + no-scrollbar (隱藏滑動條) -->
                <!-- 電腦版: lg:overflow-visible (關閉滑動，完全顯示內容) -->
                <nav id="day-nav" class="flex lg:flex-col overflow-x-auto lg:overflow-visible space-x-2 lg:space-x-0 lg:space-y-1.5 pb-2 lg:pb-0 scroll-smooth snap-x no-scrollbar">
                    <!-- JS 動態渲染按鈕 -->
                </nav>
                <button id="btn-add-day" onclick="addDayItem()" class="hidden w-full py-2.5 mt-3 border-2 border-dashed border-slate-300 text-slate-500 rounded-xl hover:border-emerald-400 hover:text-emerald-600 transition-colors items-center justify-center gap-2 text-sm font-bold bg-slate-50 hover:bg-emerald-50">
                    <i data-lucide="plus-circle" class="w-4 h-4"></i>
                    <span>新增天數</span>
                </button>
            </div>
        </aside>

        <!-- 中間欄：本日亮點 (時間軸) -->
        <section id="main-content-section" class="flex-grow bg-white rounded-2xl shadow-sm border border-slate-100 p-5 sm:p-6 flex flex-col gap-4 min-w-0">
            <!-- 本日亮點頭部 -->
            <div class="flex items-center gap-3 border-b border-slate-100 pb-4 break-inside-avoid">
                
                <!-- 左側：打孔日曆 Icon 容器 -->
                <div id="detail-calendar-icon-container" class="shrink-0">
                    <!-- 由 JS 動態呼叫 generateCalendarIconHtml 渲染 -->
                </div>
                
                <!-- 右側：主標題與地區膠囊 -->
                <div class="flex flex-col items-start gap-2">
                    <!-- 主標題 -->
                    <h2 id="detail-title" class="text-3xl font-black text-slate-900 leading-tight">載入中...</h2>
                    
                    <!-- 👇 1. 新增：單日日期顯示容器 -->
                    <div id="day-date-display" class="text-sm font-bold text-slate-500 tracking-wide flex items-center gap-1.5">
                        <!-- 這裡會由 JS 動態填入日期或編輯框 -->
                    </div>

                    <!-- 地區膠囊 (在標題下方) -->
                    <div id="detail-badge-container" class="hidden">
                        <span id="detail-badge" class="inline-flex items-center text-xs font-bold px-2.5 py-1 rounded-md transition-colors duration-300">
                            <span id="detail-region-txt">MAIN</span>
                        </span>
                    </div>
                </div>
            </div>

            <!-- 數據缺失備用警示框 -->
            <div id="fallback-warning" class="hidden bg-red-50 border border-red-200 rounded-2xl p-2 text-red-800">
                <div class="flex items-start space-x-3">
                    <i data-lucide="alert-octagon" class="w-5 h-5 text-red-600 shrink-0 mt-0.5"></i>
                    <div>
                        <h3 class="font-bold text-sm">數據檔載入失敗！</h3>
                        <p class="text-xs text-red-700/90 mt-1" id="fallback-reason-text"></p>
                    </div>
                </div>
            </div>

            <!-- 時間軸 -->
            <div>
                <h3 class="text-xs font-black text-slate-400 uppercase tracking-widest mb-4 flex items-center space-x-2">
                    <i data-lucide="clock" class="w-4 h-4"></i>
                    <span>TIMELINE</span>
                </h3>
                <div id="detail-timeline" class="relative ml-3 border-l border-slate-200 space-y-4">
                    <!-- 由 JS 渲染生成 -->
                </div>
            </div>
            <button id="btn-add-timeline" onclick="addTimelineItem()" class="hidden w-full py-3 mt-4 border-2 border-dashed border-slate-300 text-slate-500 rounded-xl hover:border-emerald-400 hover:text-emerald-600 transition-colors items-center justify-center gap-2 text-sm font-bold bg-slate-50 hover:bg-emerald-50">
                <i data-lucide="plus-circle" class="w-5 h-5"></i>
                <span>新增行程</span>
            </button>
        </section>

        <!-- 右側欄：祕笈提示與備忘筆記 -->
        <aside class="w-full lg:w-64 shrink-0 flex flex-col gap-4">
            <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-4 flex flex-col">
                <h2 class="text-xs font-black text-slate-400 uppercase mb-4">Daily Tips</h2>
                <div id="tips-container" class="flex flex-col gap-4"></div>
                <button id="btn-add-tip" onclick="addTipItem()" class="hidden w-full py-2.5 mt-3 border-2 border-dashed border-slate-300 text-slate-500 rounded-xl hover:border-emerald-400 hover:text-emerald-600 transition-colors items-center justify-center gap-2 text-sm font-bold bg-slate-50 hover:bg-emerald-50">
                    <i data-lucide="plus-circle" class="w-4 h-4"></i>
                    <span>新增 Tip</span>
                </button>
            </div>
        </aside>
    </main>

    <!-- 底部：預算速覽與買票攻略 -->
    <section id="budget-section" class="hidden max-w-[1400px] w-full mx-auto px-6 mb-4 mt-2">
        <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-5 sm:p-6">
            
            <!-- 區塊大標題 -->
            <div class="flex items-center gap-2 mb-6 border-b border-slate-100 pb-3">
                <i data-lucide="wallet" class="w-5 h-5 text-emerald-600" id="wallet-icon"></i>
                <h3 class="text-lg font-black text-slate-900">預算表</h3>
            </div>

            <!-- 雙欄佈局 (左 7 : 右 5) -->
            <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
                
                <!-- 🔴 左欄：詳細費用 -->
                <div class="lg:col-span-7 flex flex-col h-full">
                    <h4 class="font-bold text-slate-800 text-sm mb-3 flex items-center gap-2">
                        <i data-lucide="list" class="w-4 h-4 text-slate-500"></i>
                        詳細費用
                    </h4>
                    <!-- 高度加長至 500px 以配合右側高度 -->
                    <div id="expense-list" class="space-y-1 text-sm bg-slate-50 p-4 rounded-xl border border-slate-100 flex-grow max-h-[500px] overflow-y-auto">
                        <!-- 由 JS 渲染 -->
                    </div>
                </div>

                <!-- 🔴 右欄：預算卡片 + JR Pass 評估 -->
                <div class="lg:col-span-5 flex flex-col gap-6">
                    
                    <!-- 1. 預算拆解卡片 (2x2 網格) -->
                    <div>
                        <h4 class="font-bold text-slate-800 text-sm mb-3 flex items-center gap-2">
                            <i data-lucide="pie-chart" class="w-4 h-4 text-slate-500"></i>
                            各類統計
                        </h4>
                        <div id="budget-cards-container" class="grid grid-cols-2 gap-3">
                            <!-- 由 JS 渲染生成 -->
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>
    <!-- 底部版權 -->
    <footer class="bg-slate-900 text-slate-400 py-6 border-t border-slate-800 text-xs">
        <div class="max-w-[1400px] mx-auto px-6 text-center flex flex-col sm:flex-row items-center justify-between gap-4">
            <p>© 2026 行程規劃助手 | 本地直接點擊執行</p>
            <p class="flex items-center space-x-2 justify-center">
                <span class="inline-block w-2 h-2 rounded-full bg-emerald-500"></span>
                <span id="data-status-txt">資料加載成功</span>
            </p>
        </div>
    </footer>
    <button id="btn-save" class="fixed bottom-8 right-8 bg-slate-800 text-white px-5 py-3 rounded-full shadow-xl hover:bg-slate-700 hover:shadow-2xl transition-all duration-200 flex items-center gap-2 z-50 print:hidden">
        <i data-lucide="save" class="w-5 h-5"></i>
        <span class="font-medium tracking-wide">Save</span>
    </button>
    <button id="btn-export-json" class="fixed bottom-8 right-8 bg-slate-800 text-white px-5 py-3 rounded-full shadow-xl hover:bg-slate-700 hover:shadow-2xl transition-all duration-200 flex items-center gap-2 z-50 print:hidden">
        <i data-lucide="download" class="w-5 h-5"></i>
        <span class="font-medium tracking-wide">匯出</span>
    </button>
    <!-- 引入外部 JS 引擎 -->
    <script src="theme.js"></script>
    <script src="common.js"></script>
    <script src="saveHandler.js"></script>
    <script src="budget.js"></script>
    <script src="print.js"></script>
    <script src="planner.js"></script>
</body>
</html>
