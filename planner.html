<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日本旅行・行程規劃助手</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap');
        body {
            font-family: 'Noto Sans TC', sans-serif;
        }
        /* 自訂滾動條 */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        /* 👇 專門用來隱藏特定區塊的滾動條，但保留滾動功能 */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
        }
        ::-webkit-scrollbar-track {
            background: #f1f5f9;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
        /* 🖨️ 專屬列印樣式：隱藏網頁 UI，只顯示列印容器 */
        @media print {
            @page {
                margin: 5mm; 
                size: auto;
            }
            /* 徹底隱藏網頁所有預設內容 (導航、側邊欄、時間軸、預算表等) */
            body > *:not(#print-container) {
                display: none !important;
            }
            /* 只顯示我們用 JS 產生的「精美手冊」容器 */
            #print-container {
                display: block !important;
                position: relative;
                width: 100%;
            }
            /* 強制背景顏色與背景圖列印出來 */
            * {
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }
            /* 每一天強制換頁 */
            .print-page-break {
                page-break-before: always;
            }
            .no-print-link { text-decoration: none !important; }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col antialiased transition-colors duration-300">

    <!-- 隱藏的列印專用容器 -->
    <div id="print-container" class="hidden font-sans bg-white"></div>

    <!-- 頂部漸層導航欄 -->
    <header id="main-header" class="bg-gradient-to-r from-teal-700 via-emerald-600 to-cyan-600 text-white shadow-md transition-all duration-500">
        <div class="max-w-[1400px] mx-auto px-6 py-4 flex flex-col md:flex-row items-center justify-between gap-4">
            <div class="flex items-center space-x-3.5">
                <div class="p-2 bg-white/15 rounded-xl backdrop-blur-sm shadow-inner">
                    <i data-lucide="map" class="w-7 h-7 text-teal-200" id="header-icon"></i>
                </div>
                <div>
                    <h1 class="text-2xl font-black tracking-wider flex items-center gap-2" id="header-title">
                        載入中...
                    </h1>
                    <p class="text-xs text-teal-100/90 font-medium tracking-wide mt-0.5" id="header-subtitle">
                        載入中...
                    </p>
                </div>
            </div>
            
            <!-- 即時主題色切換器 -->
            <div class="flex items-center space-x-2 bg-black/15 p-1 rounded-xl backdrop-blur-sm border border-white/5">
                <button onclick="printItinerary()" class="theme-btn px-2.5 py-1 text-[11px] font-bold rounded-lg transition-all duration-200 bg-white/20 hover:bg-white/30 text-white mr-2 flex items-center gap-1">
                    <i data-lucide="printer" class="w-3.5 h-3.5"></i>
                </button>
                <span class="text-[10px] font-black uppercase text-white/70 px-2 border-l border-white/20">切換氛圍：</span>
                <button onclick="setTheme('summer')" class="theme-btn px-2.5 py-1 text-[11px] font-bold rounded-lg transition-all duration-200 bg-white/20 hover:bg-white/30 text-white" id="btn-theme-summer">🌲 涼夏翠綠</button>
                <button onclick="setTheme('midnight')" class="theme-btn px-2.5 py-1 text-[11px] font-bold rounded-lg transition-all duration-200 text-white/80 hover:text-white" id="btn-theme-midnight">🎆 花火星夜</button>
                <button onclick="setTheme('autumn')" class="theme-btn px-2.5 py-1 text-[11px] font-bold rounded-lg transition-all duration-200 text-white/80 hover:text-white" id="btn-theme-autumn">🍁 經典秋楓</button>
                <button onclick="setTheme('grayscale')" class="theme-btn px-2.5 py-1 text-[11px] font-bold rounded-lg transition-all duration-200 text-white/80 hover:text-white" id="btn-theme-grayscale">🍵 侘寂禪灰</button>
            </div>
        </div>
    </header>

    <!-- 主內容區 (三欄佈局) -->
    <main class="flex-grow max-w-[1400px] w-full mx-auto px-6 py-6 flex flex-col lg:flex-row gap-2">
        
        <!-- 左側欄：天數選單 + 裝備指南 -->
        <aside class="w-full lg:w-64 shrink-0 flex flex-col gap-4 sticky top-0 z-50 lg:top-6 lg:self-start">
            
            <!-- 移除原本的 max-h 與 overflow-y-auto，讓它完全根據內容長高 -->
            <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-4">
                <h2 class="text-xs font-black text-slate-400 uppercase tracking-widest mb-3 flex items-center justify-between">
                    <span>每日行程軌跡</span>
                    <i data-lucide="navigation" class="w-4 h-4"></i>
                </h2>
                
                <!-- 手機版: overflow-x-auto (允許橫向滑動天數) + no-scrollbar (隱藏滑動條) -->
                <!-- 電腦版: lg:overflow-visible (關閉滑動，完全顯示內容) -->
                <nav id="day-nav" class="flex lg:flex-col overflow-x-auto lg:overflow-visible space-x-2 lg:space-x-0 lg:space-y-1.5 pb-2 lg:pb-0 scroll-smooth snap-x no-scrollbar">
                    <!-- JS 動態渲染按鈕 -->
                </nav>
            </div>
        </aside>

        <!-- 中間欄：本日亮點 (時間軸) -->
        <section id="main-content-section" class="flex-grow bg-white rounded-2xl shadow-sm border border-slate-100 p-5 sm:p-6 flex flex-col gap-4 min-w-0">
            <!-- 本日亮點頭部 -->
            <div class="flex items-center gap-3 border-b border-slate-100 pb-4 break-inside-avoid">
                
                <!-- 左側：打孔日曆 Icon 容器 -->
                <div id="detail-calendar-icon-container" class="shrink-0">
                    <!-- 由 JS 動態呼叫 generateCalendarIconHtml 渲染 -->
                </div>
                
                <!-- 右側：主標題與地區膠囊 -->
                <div class="flex flex-col items-start gap-2">
                    <!-- 主標題 -->
                    <h2 id="detail-title" class="text-3xl font-black text-slate-900 leading-tight">載入中...</h2>
                    
                    <!-- 地區膠囊 (在標題下方) -->
                    <div id="detail-badge-container" class="hidden">
                        <span id="detail-badge" class="inline-flex items-center text-xs font-bold px-2.5 py-1 rounded-md transition-colors duration-300">
                            <span id="detail-region-txt">MAIN</span>
                        </span>
                    </div>
                </div>
                
            </div>

            <!-- 數據缺失備用警示框 -->
            <div id="fallback-warning" class="hidden bg-red-50 border border-red-200 rounded-2xl p-2 text-red-800">
                <div class="flex items-start space-x-3">
                    <i data-lucide="alert-octagon" class="w-5 h-5 text-red-600 shrink-0 mt-0.5"></i>
                    <div>
                        <h3 class="font-bold text-sm">數據檔載入失敗！</h3>
                        <p class="text-xs text-red-700/90 mt-1" id="fallback-reason-text"></p>
                    </div>
                </div>
            </div>

            <!-- 時間軸 -->
            <div>
                <h3 class="text-xs font-black text-slate-400 uppercase tracking-widest mb-4 flex items-center space-x-2">
                    <i data-lucide="clock" class="w-4 h-4"></i>
                    <span>TIMELINE</span>
                </h3>
                <div id="detail-timeline" class="relative ml-3 border-l border-slate-200 space-y-4">
                    <!-- 由 JS 渲染生成 -->
                </div>
            </div>
        </section>

        <!-- 右側欄：祕笈提示與備忘筆記 -->
        <aside class="w-full lg:w-64 shrink-0 flex flex-col gap-4">
            <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-4 flex flex-col">
                <h2 class="text-xs font-black text-slate-400 uppercase mb-4">Daily Tips</h2>
                <div id="tips-container" class="flex flex-col gap-4"></div>
            </div>
        </aside>
    </main>

    <!-- 底部：預算速覽與買票攻略 -->
    <section id="budget-section" class="hidden max-w-[1400px] w-full mx-auto px-6 mb-4 mt-2">
        <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-5 sm:p-6">
            
            <!-- 區塊大標題 -->
            <div class="flex items-center gap-2 mb-6 border-b border-slate-100 pb-3">
                <i data-lucide="wallet" class="w-5 h-5 text-emerald-600" id="wallet-icon"></i>
                <h3 class="text-lg font-black text-slate-900">預算表</h3>
            </div>

            <!-- 雙欄佈局 (左 7 : 右 5) -->
            <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
                
                <!-- 🔴 左欄：詳細費用 -->
                <div class="lg:col-span-7 flex flex-col h-full">
                    <h4 class="font-bold text-slate-800 text-sm mb-3 flex items-center gap-2">
                        <i data-lucide="list" class="w-4 h-4 text-slate-500"></i>
                        詳細費用
                    </h4>
                    <!-- 高度加長至 500px 以配合右側高度 -->
                    <div id="expense-list" class="space-y-1 text-sm bg-slate-50 p-4 rounded-xl border border-slate-100 flex-grow max-h-[500px] overflow-y-auto">
                        <!-- 由 JS 渲染 -->
                    </div>
                </div>

                <!-- 🔴 右欄：預算卡片 + JR Pass 評估 -->
                <div class="lg:col-span-5 flex flex-col gap-6">
                    
                    <!-- 1. 預算拆解卡片 (2x2 網格) -->
                    <div>
                        <h4 class="font-bold text-slate-800 text-sm mb-3 flex items-center gap-2">
                            <i data-lucide="pie-chart" class="w-4 h-4 text-slate-500"></i>
                            各類統計
                        </h4>
                        <div id="budget-cards-container" class="grid grid-cols-2 gap-3">
                            <!-- 由 JS 渲染生成 -->
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>
    <!-- 底部版權 -->
    <footer class="bg-slate-900 text-slate-400 py-6 border-t border-slate-800 text-xs">
        <div class="max-w-[1400px] mx-auto px-6 text-center flex flex-col sm:flex-row items-center justify-between gap-4">
            <p>© 2026 行程規劃助手 | 本地直接點擊執行</p>
            <p class="flex items-center space-x-2 justify-center">
                <span class="inline-block w-2 h-2 rounded-full bg-emerald-500"></span>
                <span id="data-status-txt">資料加載成功</span>
            </p>
        </div>
    </footer>

    <!-- 引入外部 JS 引擎 -->
    <script src="planner.js"></script>
</body>
</html>
